<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dough Re Mi - Chatbot</title>

<link rel="stylesheet" href="css/chatbot.css">
<script defer src="js/chatbot.js"></script>
</head>

<body>

<header>
<h1>Dough Re Mi 🍞</h1>
<p>Your bakery assistant</p>
</header>

<!-- Chat Button -->
<div class="chatbot-icon" onclick="toggleChat()">💬</div>

<!-- Chat Box -->
<div class="chatbot" id="chatbot">
    <div class="chat-header">Dough Re Mi Assistant</div>
    
    <div class="chat-body" id="chatBody">
        <p><strong>Bot:</strong> Hi! 👋 How can I help you?</p>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

</body>
</html>
